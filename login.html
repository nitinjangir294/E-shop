<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopEase - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand"><i class="bi bi-bag-heart-fill"></i> ShopEase</div>
      <h5 class="mt-2 fw-bold">Welcome Back</h5>
      <p class="text-muted small">Sign in to your account</p>
    </div>

    <!-- TABS -->
    <ul class="nav nav-pills nav-fill mb-4" id="authTab">
      <li class="nav-item">
        <button class="nav-link active" id="loginTab" onclick="switchTab('login')">Login</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="registerTab" onclick="switchTab('register')">Register</button>
      </li>
    </ul>

    <!-- LOGIN FORM -->
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="loginEmail" placeholder="your@email.com" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="loginPass" placeholder="Enter password" required/>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePass('loginPass', this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember"/>
          <label class="form-check-label small" for="remember">Remember me</label>
        </div>
        <a href="#" class="small text-danger">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login <i class="bi bi-arrow-right"></i></button>
      <div id="loginError" class="alert alert-danger mt-3 d-none small"></div>
      <div id="loginSuccess" class="alert alert-success mt-3 d-none small">
        <i class="bi bi-check-circle"></i> Login successful! Redirecting...
      </div>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" class="d-none" novalidate>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="regName" placeholder="Your full name" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="regEmail" placeholder="your@email.com" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="regPass" placeholder="Create password" required/>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePass('regPass', this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="terms" required/>
        <label class="form-check-label small" for="terms">I agree to the <a href="#" class="text-danger">Terms & Conditions</a></label>
      </div>
      <button type="submit" class="btn btn-primary w-100">Create Account <i class="bi bi-arrow-right"></i></button>
      <div id="regSuccess" class="alert alert-success mt-3 d-none small">
        <i class="bi bi-check-circle"></i> Account created! You can now login.
      </div>
    </form>

    <p class="text-center mt-3 small text-muted">
      <a href="index.html" class="text-danger"><i class="bi bi-arrow-left"></i> Back to Home</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function switchTab(tab) {
    document.getElementById('loginForm').classList.toggle('d-none', tab !== 'login');
    document.getElementById('registerForm').classList.toggle('d-none', tab !== 'register');
    document.getElementById('loginTab').classList.toggle('active', tab === 'login');
    document.getElementById('registerTab').classList.toggle('active', tab === 'register');
  }

  function togglePass(id, btn) {
    const input = document.getElementById(id);
    const isPass = input.type === 'password';
    input.type = isPass ? 'text' : 'password';
    btn.innerHTML = `<i class="bi bi-eye${isPass ? '-slash' : ''}"></i>`;
  }

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    const err = document.getElementById('loginError');
    const ok = document.getElementById('loginSuccess');
    if (!email || !pass) {
      err.textContent = 'Please fill in all fields.';
      err.classList.remove('d-none');
      return;
    }
    err.classList.add('d-none');
    ok.classList.remove('d-none');
    setTimeout(() => window.location.href = 'index.html', 1500);
  });

  document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPass').value.trim();
    const terms = document.getElementById('terms').checked;
    if (!name || !email || !pass || !terms) return;
    document.getElementById('regSuccess').classList.remove('d-none');
    setTimeout(() => switchTab('login'), 2000);
    this.reset();
  });
</script>
</body>
</html>
